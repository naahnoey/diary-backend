spring.application.name=diary-backend

# ===============================
# Server Configuration
# ===============================
server.port=8080
server.servlet.context-path=/api

# ===============================
# Database Configuration (PostgreSQL)
# ===============================
spring.datasource.url=${DATASOURCE_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# AWS S3 Configuration
# ===============================
# AWS Certification
cloud.aws.credentials.access-key=${ACCESS_KEY}
cloud.aws.credentials.secret-key=${SECRET_KEY}

# AWS Region
cloud.aws.region.static=ap-northeast-2

# S3 Bucket
cloud.aws.s3.bucket=${BUCKET_NAME}

# CloudFormation Disable auto-detect
cloud.aws.stack.auto=false

# ===============================
# JPA/Hibernate Configuration
# ===============================
# DDL
spring.jpa.hibernate.ddl-auto=update

# SQL
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Hibernate Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===============================
# JWT Configuration
# ===============================
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# ===============================
# Logging Configuration
# ===============================
logging.level.root=INFO
logging.level.com.diary=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG

# ===============================
# File Upload Configuration
# ===============================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# File Upload Directory
file.upload-dir=uploads/diary-images

# ===============================
# Error Handling
# ===============================
spring.web.error.include-message=always
spring.web.error.include-binding-errors=always
spring.web.error.include-stacktrace=on_param
spring.web.error.include-exception=false

# ===============================
# CORS Configuration
# ===============================